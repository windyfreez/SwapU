#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # API 代理 - 普通路径
        location ~ ^/(api|product|category|favorite|order|user|address)(/|$) {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket 代理 - 单独配置
        location /ws/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Vue 静态资源入口
        location / {
            root d:/Codespace/Code/vue_project/vue-project1/front/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
